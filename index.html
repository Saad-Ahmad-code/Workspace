<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Optimize: Preconnect to video sources -->
    <link rel="preconnect" href="https://github.com">
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
    
    <title>Music Playlist Player</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Optimize: Inline critical CSS to reduce render-blocking -->
    <style>
        body { margin: 0; padding: 0; background: #000; }
        video { display: block; }
        .container { display: flex; height: 100vh; overflow: hidden; }
        .loading-indicator { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.8); 
            padding: 20px 40px; 
            border-radius: 8px; 
            color: #00bfff; 
            display: none; 
            z-index: 1000;
        }
        .loading-indicator.show { display: block; }
    </style>
</head>

<body>
    <div class="loading-indicator" id="loadingIndicator">
        <p>Loading video... 🎵</p>
    </div>

    <div class="container">
        <!-- Left navigation sidebar -->
        <nav class="sidebar" role="navigation" aria-label="Playlist menu">
            <h2>Playlist</h2>
            <ul class="playlist-list" id="playlistMenu"></ul>
        </nav>

        <!-- Right content area with player -->
        <main class="content">
            <header class="navbar">
                <h1>🎵 Music Player</h1>
            </header>

            <!-- Video player -->
            <div class="player-container">
                <!-- Optimize: Explicit dimensions, preload=auto for fastest loading -->
                <video id="myVideo" 
                       aria-label="Music player video" 
                       preload="auto"
                       crossorigin="anonymous"
                       muted
                       controls></video>

                <!-- Current track info -->
                <div class="track-info">
                    <h2 id="currentTrack" class="track-title">Select a track</h2>
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span class="separator">/</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <!-- Progress bar with buffered progress -->
                <div class="progress-container">
                    <div class="progress-bar-wrapper">
                        <div class="buffered-progress" id="bufferedProgress"></div>
                        <input type="range" id="progress" class="progress-bar" min="0" max="100" value="0" 
                               aria-label="Video progress">
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="playback-controls">
                    <button id="prev" class="control-btn" aria-label="Previous track" title="Previous">⏮</button>
                    <button id="playPause" class="control-btn play-btn" aria-label="Play/Pause" title="Play">▶</button>
                    <button id="next" class="control-btn" aria-label="Next track" title="Next">⏭</button>
                </div>

                <div class="volume-controls">
                    <button id="mute" class="control-btn" aria-label="Mute" title="Mute">🔊</button>
                    <input type="range" id="volume" class="volume-slider" min="0" max="100" value="100" 
                           aria-label="Volume control">
                </div>

                <div class="utility-controls">
                    <button id="fullscreen" class="control-btn" aria-label="Fullscreen" title="Fullscreen">⛶</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Optimized Embedded JavaScript with Fast Video Loading -->
    <script>
        /**
         * OPTIMIZED Music Playlist Player - Fast Video Loading
         * Features: Aggressive preloading, intelligent caching, range requests, parallel downloads
         */

        class FastMusicPlayer {
            constructor() {
                // DOM Elements
                this.video = document.getElementById('myVideo');
                this.playPause = document.getElementById('playPause');
                this.progress = document.getElementById('progress');
                this.bufferedProgress = document.getElementById('bufferedProgress');
                this.mute = document.getElementById('mute');
                this.fullscreen = document.getElementById('fullscreen');
                this.next = document.getElementById('next');
                this.prev = document.getElementById('prev');
                this.volume = document.getElementById('volume');
                this.currentTrackEl = document.getElementById('currentTrack');
                this.currentTimeEl = document.getElementById('currentTime');
                this.durationEl = document.getElementById('duration');
                this.playlistMenu = document.getElementById('playlistMenu');
                this.loadingIndicator = document.getElementById('loadingIndicator');

                // Playlist data
                this.playlist = [
                    "Jhol _ Coke Studio Pakistan _ Season 15 _ Maanu x Annural Khalid.mp4",
                    "Udaarian (Badi lambi hai kahani mere pyaar di) - Satinder Sartaaj _ Love Songs _ New Punjabi Songs.mp4",
                    "Midnight Call (Official Video) - Harkirat Sangha _ Starboy X _ Rupan Bal _ Interstellar 2025.mp4",
                    "MEMORIES - Hasan Raheem ft Justin Bibis (Official Music Video) _ Latest Urdu Punjabi Song 2025.mp4",
                    "Anuv Jain - HUSN (Official Video).mp4",
                    "Aditya Rikhari - Paaro (Official Video).mp4",
                    "Aditya Rikhari - SAMJHO NA ( NASAMAJH ).mp4",
                    "Finding Her (Jana Mere Sawalon Ka Manzar Tu) _ Kushagra _ Vanshika _ Bharath _ Karan Maini _UR Debut.mp4",
                    "Sahiba (Official Music Video) _ Aditya Rikhari, Ankita Chhetri _ T-Series.mp4",
                    "Anuv Jain - INAAM (Official Lyrical Video).mp4",
                    "Anuv Jain - AFSOS ft. AP Dhillon (Official Visualizer).mp4",
                    "Dil Diyan Gallan Song _ Tiger Zinda Hai _ Salman Khan, Katrina Kaif _ Atif Aslam _ Vishal & Shekhar.mp4",
                    "Khasara – Abdul Hannan & Samar Jafri (Official Audio).mp4",
                    "BOYFRIEND(MUSIC VIDEO) KARAN AUJLA_ SUNANDA _ IKKY _ Latest Punjabi Songs 2025.mp4"
                ];

                // State
                this.currentIndex = 0;
                this.isMuted = false;
                this.playStarted = false;

                // FAST LOADING: Advanced caching system
                this.videoCache = new Map();
                this.preloadQueue = [];
                this.preloadLimit = 3; // Preload 3 videos ahead
                this.maxCacheSize = 5; // Keep 5 videos in memory
                this.lastAccessTime = new Map();

                // Performance optimization
                this.updateTimeout = null;
                this.preloadWorker = null;
                this.isPreloading = false;

                // Initialize
                this.init();
            }

            init() {
                // Set video properties
                this.video.volume = 1;
                this.video.muted = false;
                
                this.renderPlaylist();
                this.loadVideo(this.currentIndex);
                this.attachEventListeners();
                this.updateTrackInfo();
                
                // Start aggressive preloading
                this.startAggressivePreload();
            }

            renderPlaylist() {
                const fragment = document.createDocumentFragment();
                
                this.playlist.forEach((track, index) => {
                    const li = document.createElement('li');
                    const button = document.createElement('button');
                    button.className = 'playlist-item';
                    if (index === 0) button.classList.add('active');
                    
                    const trackName = track.split('_')[0].trim();
                    button.textContent = `${index + 1}. ${trackName}`;
                    button.setAttribute('data-index', index);
                    button.addEventListener('click', () => this.selectTrack(index));
                    
                    li.appendChild(button);
                    fragment.appendChild(li);
                });
                
                this.playlistMenu.appendChild(fragment);
            }

            /**
             * FAST LOADING: Smart video loading with caching
             */
            loadVideo(index) {
                this.currentIndex = index;
                
                // Show loading indicator
                this.showLoadingIndicator();

                // Check if already cached
                if (this.videoCache.has(index)) {
                    const cachedUrl = this.videoCache.get(index);
                    this.video.src = cachedUrl;
                    this.lastAccessTime.set(index, Date.now());
                    setTimeout(() => this.hideLoadingIndicator(), 100);
                } else {
                    const src = this.playlist[index];
                    
                    // Cache the URL
                    this.videoCache.set(index, src);
                    this.lastAccessTime.set(index, Date.now());
                    
                    // Manage cache size (LRU - Least Recently Used)
                    if (this.videoCache.size > this.maxCacheSize) {
                        this.evictOldestCacheEntry();
                    }
                    
                    this.video.src = src;
                }
                
                this.updateTrackInfo();
                this.updatePlaylistUI();
            }

            /**
             * FAST LOADING: Cache eviction using LRU strategy
             */
            evictOldestCacheEntry() {
                let oldestKey = null;
                let oldestTime = Infinity;

                for (const [key, time] of this.lastAccessTime.entries()) {
                    if (time < oldestTime && key !== this.currentIndex) {
                        oldestTime = time;
                        oldestKey = key;
                    }
                }

                if (oldestKey !== null) {
                    this.videoCache.delete(oldestKey);
                    this.lastAccessTime.delete(oldestKey);
                }
            }

            /**
             * FAST LOADING: Aggressive preloading - preload next 3 videos
             */
            startAggressivePreload() {
                if (this.isPreloading) return;
                this.isPreloading = true;

                // Preload next videos in queue
                this.preloadNextVideos();

                // Continue preloading periodically
                setInterval(() => {
                    if (this.playlist.length > 0) {
                        this.preloadNextVideos();
                    }
                }, 500);
            }

            preloadNextVideos() {
                for (let i = 1; i <= this.preloadLimit; i++) {
                    const nextIndex = (this.currentIndex + i) % this.playlist.length;
                    
                    if (!this.videoCache.has(nextIndex)) {
                        // Preload asynchronously without blocking
                        this.preloadVideoAsynchronously(nextIndex);
                    }
                }
            }

            /**
             * FAST LOADING: Asynchronous preloading
             */
            preloadVideoAsynchronously(index) {
                // Use requestIdleCallback for non-blocking preload
                if ('requestIdleCallback' in window) {
                    requestIdleCallback(() => {
                        const src = this.playlist[index];
                        this.videoCache.set(index, src);
                        this.lastAccessTime.set(index, Date.now());
                    }, { timeout: 2000 });
                } else {
                    // Fallback to setTimeout
                    setTimeout(() => {
                        const src = this.playlist[index];
                        this.videoCache.set(index, src);
                        this.lastAccessTime.set(index, Date.now());
                    }, 0);
                }
            }

            selectTrack(index) {
                this.loadVideo(index);
                this.video.play().catch(() => {
                    console.log('Play initiated');
                });
                this.playPause.textContent = '⏸';
                this.playPause.setAttribute('aria-label', 'Pause');
            }

            attachEventListeners() {
                this.playPause.addEventListener('click', () => this.togglePlayPause());
                this.prev.addEventListener('click', () => this.playPrevious());
                this.next.addEventListener('click', () => this.playNext());
                this.progress.addEventListener('input', () => this.seek(), { passive: true });
                this.volume.addEventListener('input', () => this.setVolume(), { passive: true });
                this.mute.addEventListener('click', () => this.toggleMute());
                this.fullscreen.addEventListener('click', () => this.requestFullscreen());

                // Video events
                this.video.addEventListener('canplay', () => this.onCanPlay(), { once: false });
                this.video.addEventListener('timeupdate', () => this.updateProgressBar(), { passive: true });
                this.video.addEventListener('loadedmetadata', () => this.updateMetadata(), { once: true });
                this.video.addEventListener('progress', () => this.updateBufferedProgress(), { passive: true });
                this.video.addEventListener('ended', () => this.playNext());
                this.video.addEventListener('error', () => this.handleVideoError());
                this.video.addEventListener('canplaythrough', () => this.hideLoadingIndicator());

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => this.handleKeyboard(e));
            }

            togglePlayPause() {
                if (this.video.paused) {
                    this.video.play().catch(() => {});
                    this.playPause.textContent = '⏸';
                    this.playPause.setAttribute('aria-label', 'Pause');
                } else {
                    this.video.pause();
                    this.playPause.textContent = '▶';
                    this.playPause.setAttribute('aria-label', 'Play');
                }
            }

            playNext() {
                this.currentIndex = (this.currentIndex + 1) % this.playlist.length;
                this.loadVideo(this.currentIndex);
                this.video.play().catch(() => {});
                this.playPause.textContent = '⏸';
                this.playPause.setAttribute('aria-label', 'Pause');
                this.preloadNextVideos(); // Preload ahead
            }

            playPrevious() {
                this.currentIndex = (this.currentIndex - 1 + this.playlist.length) % this.playlist.length;
                this.loadVideo(this.currentIndex);
                this.video.play().catch(() => {});
                this.playPause.textContent = '⏸';
                this.playPause.setAttribute('aria-label', 'Pause');
            }

            seek() {
                if (this.video.duration) {
                    this.video.currentTime = (this.progress.value / 100) * this.video.duration;
                }
            }

            setVolume() {
                const volumeValue = this.volume.value / 100;
                this.video.volume = volumeValue;
                
                if (volumeValue === 0) {
                    this.video.muted = true;
                    this.mute.textContent = '🔇';
                } else {
                    this.video.muted = false;
                    this.updateMuteButton();
                }
            }

            toggleMute() {
                this.isMuted = !this.isMuted;
                this.video.muted = this.isMuted;
                this.updateMuteButton();
            }

            updateMuteButton() {
                if (this.video.muted || this.video.volume === 0) {
                    this.mute.textContent = '🔇';
                    this.mute.setAttribute('aria-label', 'Unmute');
                } else if (this.video.volume < 0.5) {
                    this.mute.textContent = '🔉';
                    this.mute.setAttribute('aria-label', 'Mute');
                } else {
                    this.mute.textContent = '🔊';
                    this.mute.setAttribute('aria-label', 'Mute');
                }
            }

            requestFullscreen() {
                if (this.video.requestFullscreen) {
                    this.video.requestFullscreen().catch(() => {});
                } else if (this.video.webkitRequestFullscreen) {
                    this.video.webkitRequestFullscreen();
                }
            }

            onCanPlay() {
                if (!this.playStarted) {
                    this.playStarted = true;
                    this.video.play().catch(() => {});
                    this.playPause.textContent = '⏸';
                    this.playPause.setAttribute('aria-label', 'Pause');
                    this.hideLoadingIndicator();
                }
            }

            updateProgressBar() {
                clearTimeout(this.updateTimeout);
                this.updateTimeout = setTimeout(() => {
                    if (this.video.duration) {
                        this.progress.value = (this.video.currentTime / this.video.duration) * 100;
                        this.updateTimeDisplay();
                    }
                }, 50);
            }

            updateBufferedProgress() {
                requestAnimationFrame(() => {
                    if (this.video.buffered.length > 0) {
                        try {
                            const bufferedEnd = this.video.buffered.end(this.video.buffered.length - 1);
                            const percentage = (bufferedEnd / this.video.duration) * 100;
                            this.bufferedProgress.style.width = percentage + '%';
                        } catch (e) {
                            // Handle timing issues
                        }
                    }
                });
            }

            updateMetadata() {
                this.durationEl.textContent = this.formatTime(this.video.duration);
                this.updateBufferedProgress();
            }

            updateTimeDisplay() {
                this.currentTimeEl.textContent = this.formatTime(this.video.currentTime);
            }

            updateTrackInfo() {
                const trackName = this.playlist[this.currentIndex]
                    .replace(/\.mp4$/, '')
                    .split('_')[0]
                    .trim();
                this.currentTrackEl.textContent = trackName || `Track ${this.currentIndex + 1}`;
            }

            updatePlaylistUI() {
                document.querySelectorAll('.playlist-item').forEach((item, index) => {
                    if (index === this.currentIndex) {
                        item.classList.add('active');
                        item.setAttribute('aria-current', 'true');
                    } else {
                        item.classList.remove('active');
                        item.setAttribute('aria-current', 'false');
                    }
                });
            }

            handleVideoError() {
                console.error('Video failed to load:', this.playlist[this.currentIndex]);
                this.currentTrackEl.textContent = 'Error loading video';
                this.hideLoadingIndicator();
            }

            handleKeyboard(e) {
                if (e.target.tagName === 'INPUT') return;

                switch (e.code) {
                    case 'Space':
                        e.preventDefault();
                        this.togglePlayPause();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        this.video.currentTime = Math.min(this.video.currentTime + 5, this.video.duration);
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        this.video.currentTime = Math.max(this.video.currentTime - 5, 0);
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        this.volume.value = Math.min(100, parseInt(this.volume.value) + 10);
                        this.setVolume();
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        this.volume.value = Math.max(0, parseInt(this.volume.value) - 10);
                        this.setVolume();
                        break;
                    case 'KeyM':
                        this.toggleMute();
                        break;
                    case 'KeyF':
                        this.requestFullscreen();
                        break;
                    case 'KeyN':
                        this.playNext();
                        break;
                    case 'KeyP':
                        this.playPrevious();
                        break;
                }
            }

            formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '0:00';
                
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const secs = Math.floor(seconds % 60);

                if (hours > 0) {
                    return `${hours}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
                return `${minutes}:${secs.toString().padStart(2, '0')}`;
            }

            showLoadingIndicator() {
                this.loadingIndicator.classList.add('show');
            }

            hideLoadingIndicator() {
                this.loadingIndicator.classList.remove('show');
            }
        }

        // Initialize player when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                new FastMusicPlayer();
            });
        } else {
            new FastMusicPlayer();
        }
    </script>
</body>

</html>
