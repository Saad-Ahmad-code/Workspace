<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist Player</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Left navigation sidebar -->
        <nav class="sidebar" role="navigation" aria-label="Playlist menu">
            <h2>Playlist</h2>
            <ul class="playlist-list" id="playlistMenu"></ul>
        </nav>

        <!-- Right content area with player -->
        <main class="content">
            <header class="navbar">
                <h1>🎵 Music Player</h1>
            </header>

            <!-- Video player -->
            <div class="player-container">
                <video id="myVideo" aria-label="Music player video" preload="auto"></video>

                <!-- Current track info -->
                <div class="track-info">
                    <h2 id="currentTrack" class="track-title">Select a track</h2>
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span class="separator">/</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <!-- Progress bar with buffered progress -->
                <div class="progress-container">
                    <div class="progress-bar-wrapper">
                        <div class="buffered-progress" id="bufferedProgress"></div>
                        <input type="range" id="progress" class="progress-bar" min="0" max="100" value="0" 
                               aria-label="Video progress">
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="playback-controls">
                    <button id="prev" class="control-btn" aria-label="Previous track" title="Previous">⏮</button>
                    <button id="playPause" class="control-btn play-btn" aria-label="Play/Pause" title="Play">▶</button>
                    <button id="next" class="control-btn" aria-label="Next track" title="Next">⏭</button>
                </div>

                <div class="volume-controls">
                    <button id="mute" class="control-btn" aria-label="Mute" title="Mute">🔊</button>
                    <input type="range" id="volume" class="volume-slider" min="0" max="100" value="100" 
                           aria-label="Volume control">
                </div>

                <div class="utility-controls">
                    <button id="fullscreen" class="control-btn" aria-label="Fullscreen" title="Fullscreen">⛶</button>
                </div>
            </div>
        </main>
    </div>

    <script src="player.js" defer></script>
</body>

</html>
